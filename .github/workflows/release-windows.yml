# Construye el instalador Windows y sube a GitHub Releases (latest.yml + .exe).
# Así electron-updater detecta la nueva versión cuando los usuarios abren la app.
#
# Cómo publicar una versión nueva:
# 1. Poné en package.json la misma versión que vas a etiquetar (ej. 1.0.8).
# 2. Commit + push a master (o tu rama principal).
# 3. git tag v1.0.8 && git push origin v1.0.8
# Este workflow se dispara solo, genera el NSIS y adjunta los assets a la Release.

name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
